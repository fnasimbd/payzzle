<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Home</title>
    <link rel="stylesheet" th:href="@{/css/output.css}">
</head>
<body>
<h1 th:text="${message}">Hello</h1>
<div class="grid grid-cols-4">
    <div class="col-start-2 col-span-2">
        <form action="/process_card_payment" method="post">
            <label for="card_number">
                Card Number
                <input th:type="text" th:id="card_number" name="card_number" />
            </label>
            <br>
            <label for="name_on_card">
                Name on Card
                <input th:type="text" th:id="name_on_card" name="name_on_card" />
            </label>
            <br>
            <label for="expiry_month">
                Expiry Month
                <input th:type="text" th:id="expiry_month" name="expiry_month" />
            </label>
            <br>
            <label for="expiry_year">
                Expiry Year
                <input th:type="text" th:id="expiry_year" name="expiry_year" />
            </label>
            <br>
            <label for="cvv">
                CVV Number
                <input th:type="text" th:id="cvv" name="cvv" />
            </label>
            <br>

            <input th:type="hidden" name="transaction_id" th:value="${transaction_id}" />
            <input th:type="hidden" name="amount" th:value="${amount}" />
            <input th:type="hidden" name="currency" th:value="${currency}" />
            <input th:type="hidden" name="success_url" th:value="${success_url}" />
            <input th:type="hidden" name="failure_url" th:value="${fail_url}" />
            <input th:type="hidden" name="cancel_url" th:value="${cancel_url}" />

            <input type="submit" />
        </form>
    </div>
</div>
</body>
</html>
